{% extends "base.html" %}
{% block content %}
<div class="relative flex min-h-screen items-center justify-center overflow-hidden bg-[#103678] px-6 py-12">
  <div class="pointer-events-none absolute inset-0 overflow-hidden">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(29,129,228,0.12),transparent_24%),radial-gradient(circle_at_85%_12%,rgba(20,102,205,0.1),transparent_22%)]"></div>
    <div class="absolute inset-0 opacity-20" style="background-image:linear-gradient(rgba(148,163,184,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(148,163,184,0.08) 1px, transparent 1px); background-size:96px 96px;"></div>
  </div>

  <div class="premium-panel-dark relative z-10 w-full max-w-md rounded-[2rem] p-8 text-white">
    <div class="absolute inset-x-8 top-0 h-px bg-gradient-to-r from-transparent via-[#74b4d9]/80 to-transparent"></div>
    <img src="{{ url_for('static', filename='images/kollrax-logo-site.png') }}" alt="KollraX" class="mb-5 h-14 w-14 object-contain" />
    <p class="text-xs font-semibold uppercase tracking-[0.28em] text-[#ebebeb]">Secure Workspace Access</p>
    <h1 class="text-2xl font-semibold tracking-tight">Welcome back</h1>
    <p class="mt-2 text-sm text-[#ebebeb]">Access your KollraX workspace securely.</p>

    <form method="post" class="mt-6 grid gap-4">
      <input required name="email" type="email" placeholder="Email" class="premium-input rounded-2xl px-4 py-3.5 text-sm text-white outline-none placeholder:text-[#ebebeb]" />
      <input required name="password" type="password" placeholder="Password" class="premium-input rounded-2xl px-4 py-3.5 text-sm text-white outline-none placeholder:text-[#ebebeb]" />
      <button class="premium-button-primary rounded-2xl px-5 py-3.5 text-sm font-semibold text-white">Login</button>
      {% if error %}
        <p class="text-sm text-rose-300">{{ error }}</p>
      {% endif %}
      <div class="flex justify-between text-sm text-[#ebebeb]">
        <a href="{{ url_for('recover') }}">Forgot password?</a>
        <a href="{{ url_for('register') }}">Create account</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
